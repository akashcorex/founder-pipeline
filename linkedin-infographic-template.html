<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infographic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0a0a0a;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    color: #FFFFFF;
  }

  .container {
    width: 1080px;
    height: 1080px;
    padding: 60px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .header { margin-bottom: 48px; }
  .title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 16px;
    font-weight: 400;
    color: #888888;
  }

  .chart-area { flex: 1; }

  /* Bar chart */
  .bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    height: 40px;
  }
  .bar-label {
    width: 180px;
    font-size: 16px;
    font-weight: 500;
    color: #CCCCCC;
    text-align: right;
    padding-right: 20px;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 100%;
    background: #1a1a1a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 12px;
  }
  .bar-value {
    font-size: 18px;
    font-weight: 700;
    color: #FFFFFF;
  }

  /* Donut */
  .donut-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    height: 100%;
  }
  .donut-center {
    position: absolute;
    text-align: center;
  }
  .donut-center .big-number {
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
  }
  .donut-center .label {
    font-size: 16px;
    color: #888888;
    margin-top: 8px;
  }
  .legend { display: flex; flex-direction: column; gap: 12px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    color: #CCCCCC;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* Hero number */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
  }
  .hero-number {
    font-size: 96px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }
  .hero-context {
    font-size: 20px;
    color: #A1A1A1;
    max-width: 600px;
    line-height: 1.5;
  }

  /* Timeline */
  .timeline-row {
    display: flex;
    align-items: center;
    margin-bottom: 24px;
    gap: 20px;
  }
  .timeline-year {
    width: 80px;
    font-size: 28px;
    font-weight: 700;
    color: #A1A1A1;
    text-align: right;
    flex-shrink: 0;
  }
  .timeline-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .timeline-stat {
    font-size: 24px;
    font-weight: 600;
  }
  .timeline-desc {
    font-size: 15px;
    color: #888888;
    margin-top: 2px;
  }

  /* Comparison split */
  .split {
    display: flex;
    height: 100%;
    gap: 0;
  }
  .split-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
    text-align: center;
  }
  .split-divider {
    width: 1px;
    background: #333333;
  }
  .split-label {
    font-size: 18px;
    font-weight: 600;
    color: #A1A1A1;
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .split-number {
    font-size: 64px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 12px;
  }
  .split-detail {
    font-size: 16px;
    color: #888888;
    line-height: 1.5;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 24px;
  }
  .source {
    font-size: 12px;
    color: #555555;
  }
  .brand-tag {
    font-size: 13px;
    color: #666666;
    font-weight: 500;
  }

  /* Accent colors */
  .purple { color: #7C3AED; }
  .mint { color: #06D6A0; }
  .coral { color: #FF6B6B; }
  .amber { color: #F59E0B; }
  .bg-purple { background: #7C3AED; }
  .bg-mint { background: #06D6A0; }
  .bg-coral { background: #FF6B6B; }
  .bg-amber { background: #F59E0B; }
</style>
</head>
<body>
  <div class="container">
    <!-- Content slots - replace with format-specific content -->
    <div class="header">
      <div class="title">[Infographic Title]</div>
      <div class="subtitle">[Subtitle or context line]</div>
    </div>
    <div class="chart-area">
      <!-- Format-specific chart HTML goes here -->
    </div>
    <div class="footer">
      <div class="source">Source: [Source, Year]</div>
      <div class="brand-tag">@akashlaha</div>
    </div>
  </div>
</body>
</html>
