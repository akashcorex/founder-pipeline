name: Daily LinkedIn Posts Pipeline

on:
  schedule:
    # Trigger daily at 2:30 AM UTC (which is 8:00 AM IST)
    - cron: '30 2 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
      BUFFER_ORG_ID: ${{ secrets.BUFFER_ORG_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Workflow diagnostics
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "branch=${GITHUB_REF_NAME}"
          if [ -n "${GEMINI_API_KEY}" ]; then echo "gemini_secret=present"; else echo "gemini_secret=missing"; fi
          if [ -n "${BUFFER_API_KEY}" ]; then echo "buffer_secret=present"; else echo "buffer_secret=missing"; fi
          if [ -n "${BUFFER_ORG_ID}" ]; then echo "buffer_org_secret=present"; else echo "buffer_org_secret=missing"; fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        run: |
          cd carousel-routine
          npm install

      - name: Run pipeline live
        run: |
          python3 run_pipeline.py --live

      - name: Commit and push updated logs and cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add carousel-hook-log.json infographic-run-log.json scheduled_history.json reddit_data.json ai_news_data.json || true
          git commit -m "Automated: update run logs and data cache [skip ci]" || exit 0
          git push origin HEAD:main
